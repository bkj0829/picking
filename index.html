      <div class="cb"><div class="cn">${d["상품명"]}</div><div class="co">${d["옵션명"]||"단일"}</div></div>
      <div class="qb">${d["상품수량"]}<span>개</span></div>
    </div>`;
  }).join("");
  const s=rows.reduce((a,d)=>a+d["상품수량"],0);
  document.getElementById("fc").textContent=rows.length+"개 품목";
  document.getElementById("fs").textContent=s;
}
function checkAll(){D.forEach((_,i)=>ck.add(i));us();render();}
function rst(){if(confirm("체크를 모두 초기화할까요?")){ck.clear();sd=false;us();render();}}
function td(){sd=!sd;render();}
render();
</script>
