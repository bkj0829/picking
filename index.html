locs.forEach(l=>{const t=document.createElement("div");t.className="tab";t.textContent=l;t.onclick=()=>sf(l,t);te.appendChild(t);});
function sf(f,el){cf=f;sd=false;document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));el.classList.add("active");render();}
function tog(i){if(ck.has(i))ck.delete(i);else ck.add(i);us();render();}
function us(){
  const d=ck.size,r=T-d,p=T>0?Math.round(d/T*100):0;
  document.getElementById("pf").style.width=p+"%";
  document.getElementById("pl").textContent=d+" / "+T+" 완료";
  document.getElementById("pp").textContent=p+"%";
  document.getElementById("cd").textContent="✅ 완료 "+d;
  document.getElementById("cr").textContent="📦 잔여 "+r;
}
function render(){
  const q=document.getElementById("sq").value.trim().toLowerCase();
  let rows=D.map((d,i)=>({...d,i}));
  if(cf!=="전체")rows=rows.filter(d=>d["위치"]===cf);
  if(q)rows=rows.filter(d=>d["상품명"].toLowerCase().includes(q)||d["위치"].toLowerCase().includes(q)||d["옵션명"].toLowerCase().includes(q));
  if(sd)rows=rows.filter(d=>ck.has(d.i));
  const le=document.getElementById("list");
  if(!rows.length){le.innerHTML="<div class=\"empty\">항목이 없습니다</div>";document.getElementById("fc").textContent="0개 품목";document.getElementById("fs").textContent="0";return;}
  le.innerHTML=rows.map(d=>{
    const dn=ck.has(d.i);
    const loc=(d["위치"]||"-").replace(/,/g,"\n");
    return `<div class="card${dn?" done":""}" onclick="tog(${d.i})">
      <div class="ci">${dn?"✓":""}</div>
      <div class="lb">${loc}</div>
      <div class="cb"><div class="cn">${d["상품명"]}</div><div class="co">${d["옵션명"]||"단일"}</div></div>
      <div class="qb">${d["상품수량"]}<span>개</span></div>
    </div>`;
  }).join("");
  const s=rows.reduce((a,d)=>a+d["상품수량"],0);
  document.getElementById("fc").textContent=rows.length+"개 품목";
  document.getElementById("fs").textContent=s;
}
function checkAll(){D.forEach((_,i)=>ck.add(i));us();render();}
function rst(){if(confirm("체크를 모두 초기화할까요?")){ck.clear();sd=false;us();render();}}
function td(){sd=!sd;render();}
render();
</script>
</body>
</html>
